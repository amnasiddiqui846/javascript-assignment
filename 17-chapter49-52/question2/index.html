<!-- Suppose in your webpage there is content area in which
you have entered your item details, but user can only see
some details on first look. When user clicks on “Read
more” button, full detail of that particular item will be
displayed. -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Read More Example</title>
  <link rel="stylesheet" href="style.css">
</head>
    <body>
         <h2>Product Details</h2>

  <p>
    This is a premium quality product with modern design.
    
    <span class="more-text" id="more">
      It is durable, lightweight, and perfect for daily use.
      Available in different colors and sizes.
    </span>
  </p>

  <button onclick="showMore()" id="btn">Read More</button>
  </body>
    <script>src="script.js"</script>
</html>
